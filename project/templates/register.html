{% extends 'base.html' %}
{% import 'bootstrap5/form.html' as wtf %}
{% block content %}
<section class="shadow-sm mb-5 mt-5">
    <div class="container">
        <div class="row">
            <div class="col-12">
                <h1>Public User Registration</h1>
            </div>
        </div>
        <div class="row mt-4 justify-content-center p-3">
            <div class="col-md-6">{{ wtf.render_form(form) }}</div>
            <small class="text-muted row mt-4 justify-content-center"> Already have an account?
                <a class="row mt-4 justify-content-center" href="{{ url_for('login.login') }}">
                  Log in</a>
            </small>
        </div>
    </div>
</section>
{% endblock content %}
